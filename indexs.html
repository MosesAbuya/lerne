<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Barrizi Organization Kenya - Under Construction</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons for design -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- Custom CSS for animations and theme -->
  <style>
    /* Global Styles */
    body {
      font-family: 'Roboto', sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* Main container */
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 800px;
    }

    /* Title */
    .title {
      font-size: 2.8rem;
      font-weight: 700;
      color: #f27420;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    /* Subtitle */
    .subtitle {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 40px;
    }

    /* Countdown timer */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 2rem;
      margin-bottom: 30px;
    }

    .countdown .time {
      background: #f27420;
      color: white;
      padding: 20px 30px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }

    .countdown .time:hover {
      transform: scale(1.1);
    }

    /* Icon */
    .icon {
      font-size: 5rem;
      color: #f27420;
      margin-bottom: 30px;
      animation: bounce 2s infinite;
    }

    /* Coming Soon Text */
    .coming-soon {
      font-size: 1.3rem;
      color: #555;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Animations */
    @keyframes bounce {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

  </style>
</head>
<body>
  <div class="container">
    <!-- Barrizi Logo (you can replace with actual logo) -->
    <div class="icon">
      <i class="fas fa-tools"></i>
    </div>
    
    <!-- Title -->
    <h1 class="title">Barrizi Organization Kenya</h1>
    
    <!-- Subtitle -->
    <p class="subtitle">We are currently working on something amazing! Stay tuned for our upcoming launch.</p>

    <!-- Countdown Timer -->
    <div id="countdown" class="countdown">
      <div class="time" id="days">00</div>
      <div class="time" id="hours">00</div>
      <div class="time" id="minutes">00</div>
      <div class="time" id="seconds">00</div>
    </div>

    <!-- Coming Soon Message -->
    <div class="coming-soon">
      <p>Our website is launching on <strong>January 20, 2025</strong></p>
    </div>
  </div>

  <!-- Bootstrap JS and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
  
  <!-- Countdown Timer Script -->
  <script>
    // Set the date we're counting down to
    const countDownDate = new Date("Jan 20, 2025 00:00:00").getTime();

    // Update the countdown every 1 second
    const x = setInterval(function() {
      
      // Get the current date and time
      const now = new Date().getTime();

      // Find the distance between now and the countdown date
      const distance = countDownDate - now;

      // Calculate time remaining
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // Display the result
      document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
      document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
      document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
      document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

      // If the countdown is over, display a message
      if (distance < 0) {
        clearInterval(x);
        document.getElementById("countdown").innerHTML = "<strong>We're live now!</strong>";
      }
    }, 1000);
  </script>
</body>
</html>
